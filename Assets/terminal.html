<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #1e1e2e; overflow: hidden; }
    #root { position: relative; width: 100%; height: 100%; }

    /* ── 普通模式：每个 session 占满整个 root ── */
    .session-wrap {
      position: absolute; inset: 0; display: none;
      padding: 6px 8px;
    }
    .session-wrap.active { display: block; }

    /* ── 分屏模式：左右两个 session 各占一半 ── */
    /*
     * 必须显式 right:auto / left:auto 来重置 .session-wrap 的 inset:0
     * 否则两侧均受 left:0 约束，CSS 过约束后 right 被忽略，导致两个 pane 重叠。
     */
    .session-wrap.split-primary {
      display: block;
      position: absolute;
      left: 0; right: auto; top: 0; bottom: 0;
      width: var(--split-left-w, calc(50% - 2px));
    }
    .session-wrap.split-secondary {
      display: block;
      position: absolute;
      left: auto; right: 0; top: 0; bottom: 0;
      width: var(--split-right-w, calc(50% - 2px));
    }

    /* ── 分屏分隔条 ── */
    #split-divider {
      display: none;
      position: absolute;
      top: 0; bottom: 0;
      width: 4px;
      background: #313244;
      cursor: col-resize;
      left: 50%; transform: translateX(-50%);
      z-index: 100;
      transition: background 0.15s;
    }
    #split-divider:hover { background: #45475a; }
    #split-divider.active { display: block; }

    .xterm-viewport::-webkit-scrollbar { width: 8px; }
    .xterm-viewport::-webkit-scrollbar-track { background: #181825; }
    .xterm-viewport::-webkit-scrollbar-thumb { background: #45475a; border-radius: 4px; }

    /* 右键菜单 */
    #ctx-menu {
      display: none;
      position: fixed;
      background: #313244;
      border: 1px solid #45475a;
      border-radius: 6px;
      padding: 4px;
      z-index: 9999;
      min-width: 130px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    }
    .ctx-item {
      padding: 6px 14px;
      font-size: 13px;
      color: #cdd6f4;
      font-family: system-ui, sans-serif;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
    }
    .ctx-item:hover { background: #45475a; }
    .ctx-item .hint { color: #6c7086; font-size: 11px; }
    .ctx-sep { height: 1px; background: #45475a; margin: 3px 4px; }
  </style>
  <link rel="stylesheet" href="xterm.min.css">
</head>
<body>
  <div id="root">
    <div id="split-divider"></div>
  </div>

  <!-- 右键菜单 -->
  <div id="ctx-menu">
    <div class="ctx-item" id="ctx-copy">
      <span>复制</span><span class="hint">Ctrl+Shift+C</span>
    </div>
    <div class="ctx-item" id="ctx-paste">
      <span>粘贴</span><span class="hint">Ctrl+Shift+V</span>
    </div>
    <div class="ctx-sep"></div>
    <div class="ctx-item" id="ctx-selall">全选</div>
    <div class="ctx-item" id="ctx-clear">清屏</div>
  </div>

  <script src="xterm.min.js"></script>
  <script src="addon-fit.min.js"></script>
  <script>
    const sessions = {};
    let activeId    = null;   // 键盘焦点所在 session
    let splitPrimId = null;   // 分屏左侧 session id
    let splitSecId  = null;   // 分屏右侧 session id
    const root      = document.getElementById('root');
    const divider   = document.getElementById('split-divider');
    const ctxMenu   = document.getElementById('ctx-menu');

    // ── WebView2 消息接收 ─────────────────────────────────────────────────────
    window.chrome.webview.addEventListener('message', evt => {
      const msg = JSON.parse(evt.data);
      const { type, sessionId } = msg;
      if      (type === 'create')   createSession(sessionId);
      else if (type === 'activate') activateSession(sessionId);
      else if (type === 'focus')    focusSession(sessionId);
      else if (type === 'data')     writeData(sessionId, msg.data);
      else if (type === 'resize')   resizeSession(sessionId, msg.cols, msg.rows);
      else if (type === 'destroy')  destroySession(sessionId);
      else if (type === 'split')    setSplitMode(msg.primaryId, msg.secondaryId);
      else if (type === 'unsplit')  exitSplitMode();
    });

    // ── 会话管理 ──────────────────────────────────────────────────────────────
    function createSession(id) {
      if (sessions[id]) return;
      const wrap = document.createElement('div');
      wrap.className = 'session-wrap';
      root.appendChild(wrap);

      // 点击某个 pane 时更新 activeId（用于粘贴等）
      wrap.addEventListener('mousedown', () => { activeId = id; });

      const term = new Terminal({
        fontFamily: '"Cascadia Code","JetBrains Mono","Fira Code",Consolas,monospace',
        fontSize: 13,
        lineHeight: 1.3,
        cursorBlink: true,
        scrollback: 5000,
        copyOnSelect: false,
        theme: {
          background:     '#1e1e2e',
          foreground:     '#00fb00',
          cursor:         '#00fb00',
          cursorAccent:   '#1e1e2e',
          selectionBackground: '#3d5a3d',
          black:          '#1e1e2e', red:          '#ff6b6b',
          green:          '#00fb00', yellow:       '#f9e2af',
          blue:           '#89b4fa', magenta:      '#cba6f7',
          cyan:           '#89dceb', white:        '#e0e0e0',
          brightBlack:    '#585b70', brightRed:    '#ff8787',
          brightGreen:    '#33ff33', brightYellow: '#f9e2af',
          brightBlue:     '#89b4fa', brightMagenta:'#cba6f7',
          brightCyan:     '#89dceb', brightWhite:  '#ffffff'
        }
      });

      const fit = new FitAddon.FitAddon();
      term.loadAddon(fit);
      term.open(wrap);

      term.onData(data => {
        window.chrome.webview.postMessage(
          JSON.stringify({ type: 'input', sessionId: id, data })
        );
      });

      term.onSelectionChange(() => {
        const sel = term.getSelection();
        if (sel) {
          window.chrome.webview.postMessage(
            JSON.stringify({ type: 'copy-text', sessionId: id, data: sel })
          );
        }
      });

      sessions[id] = { term, fit, wrap };
      scheduleSessionLayout(id, { notify: false, focus: false });
    }

    function activateSession(id) {
      if (splitPrimId !== null && splitSecId !== null) {
        // 分屏模式：activate 用于切换主侧（左侧）session
        if (sessions[splitPrimId]) sessions[splitPrimId].wrap.classList.remove('split-primary');
        splitPrimId = id;
        if (sessions[id]) {
          sessions[id].wrap.classList.add('split-primary');
          activeId = id;
          scheduleSessionLayout(id, { notify: true, focus: true });
        }
        return;
      }
      // 普通模式
      Object.values(sessions).forEach(s => s.wrap.classList.remove('active'));
      if (!sessions[id]) return;
      sessions[id].wrap.classList.add('active');
      activeId = id;
      scheduleSessionLayout(id, { notify: true, focus: true });
    }

    function focusSession(id) {
      if (!sessions[id]) return;
      activeId = id;
      scheduleSessionLayout(id, { notify: true, focus: true });
    }

    function setSplitMode(pId, sId) {
      // 先清除所有状态
      Object.values(sessions).forEach(s => {
        s.wrap.classList.remove('active', 'split-primary', 'split-secondary');
      });

      splitPrimId = pId;
      splitSecId  = sId;
      activeId    = pId;

      if (sessions[pId]) sessions[pId].wrap.classList.add('split-primary');
      if (sessions[sId]) sessions[sId].wrap.classList.add('split-secondary');
      divider.classList.add('active');

      if (sessions[pId]) scheduleSessionLayout(pId, { notify: true, focus: true });
      if (sessions[sId]) scheduleSessionLayout(sId, { notify: true, focus: false });
    }

    function exitSplitMode() {
      if (splitPrimId === null) return;
      const keepId = splitPrimId;
      Object.values(sessions).forEach(s => {
        s.wrap.classList.remove('split-primary', 'split-secondary');
      });
      divider.classList.remove('active');
      splitPrimId = null;
      splitSecId  = null;
      // 恢复普通 activate
      if (sessions[keepId]) activateSession(keepId);
    }

    function writeData(id, data) {
      if (sessions[id]) sessions[id].term.write(data);
    }

    function resizeSession(id, cols, rows) {
      if (!sessions[id]) return;
      try { sessions[id].term.resize(cols, rows); } catch(e) {}
      scheduleSessionLayout(id, { notify: false, focus: false });
    }

    function destroySession(id) {
      if (!sessions[id]) return;
      // 若分屏中涉及该 session，先退出分屏
      if (id === splitPrimId || id === splitSecId) exitSplitMode();
      sessions[id].term.dispose();
      root.removeChild(sessions[id].wrap);
      delete sessions[id];
      if (activeId === id) activeId = null;
    }

    function notifySize(id) {
      if (!sessions[id]) return;
      const { cols, rows } = sessions[id].term;
      window.chrome.webview.postMessage(
        JSON.stringify({ type: 'resize', sessionId: id, cols, rows })
      );
    }

    function syncSessionLayout(id, { notify = true, focus = false } = {}) {
      if (!sessions[id]) return false;
      const { wrap, fit, term } = sessions[id];
      if (wrap.clientWidth < 8 || wrap.clientHeight < 8) return false;

      try { fit.fit(); } catch (e) {}
      if (notify) notifySize(id);
      if (focus) {
        try { window.focus(); } catch (e) {}
        try { term.focus(); } catch (e) {}
      }
      return true;
    }

    function scheduleSessionLayout(id, { notify = true, focus = false } = {}) {
      [0, 30, 120].forEach(delay => {
        setTimeout(() => {
          if (!sessions[id]) return;
          requestAnimationFrame(() => {
            requestAnimationFrame(() => {
              syncSessionLayout(id, { notify, focus });
            });
          });
        }, delay);
      });
    }

    // ── 键盘快捷键 ────────────────────────────────────────────────────────────
    document.addEventListener('keydown', e => {
      if (e.ctrlKey && e.shiftKey) {
        if (e.key === 'C' || e.key === 'c') {
          e.preventDefault();
        } else if (e.key === 'V' || e.key === 'v') {
          e.preventDefault();
          const target = activeId !== null ? activeId : splitPrimId;
          if (target !== null) {
            window.chrome.webview.postMessage(
              JSON.stringify({ type: 'paste-request', sessionId: target })
            );
          }
        }
      }
    });

    // ── Ctrl+滚轮缩放 ────────────────────────────────────────────────────────
    document.addEventListener('wheel', e => {
      if (!e.ctrlKey) return;
      e.preventDefault();
      const target = activeId !== null ? activeId : splitPrimId;
      if (target === null || !sessions[target]) return;
      const term = sessions[target].term;
      const cur  = term.options.fontSize || 13;
      const next = e.deltaY < 0 ? Math.min(cur + 1, 28) : Math.max(cur - 1, 8);
      if (next !== cur) {
        term.options.fontSize = next;
        sessions[target].fit.fit();
        notifySize(target);
      }
    }, { passive: false });

    // ── 分隔条拖动（调整左右比例） ───────────────────────────────────────────
    divider.addEventListener('mousedown', e => {
      e.preventDefault();
      const rootRect = root.getBoundingClientRect();
      function onMove(ev) {
        const ratio = (ev.clientX - rootRect.left) / rootRect.width;
        const pct   = Math.max(0.2, Math.min(0.8, ratio)) * 100;
        root.style.setProperty('--split-left-w',  `calc(${pct}% - 2px)`);
        root.style.setProperty('--split-right-w', `calc(${100 - pct}% - 2px)`);
        divider.style.left      = pct + '%';
        divider.style.transform = 'translateX(-50%)';
      }
      function onUp() {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup',   onUp);
        // re-fit both after drag
        if (splitPrimId && sessions[splitPrimId]) { sessions[splitPrimId].fit.fit(); notifySize(splitPrimId); }
        if (splitSecId  && sessions[splitSecId])  { sessions[splitSecId].fit.fit();  notifySize(splitSecId);  }
      }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup',   onUp);
    });

    // ── 右键菜单 ──────────────────────────────────────────────────────────────
    document.addEventListener('contextmenu', e => {
      e.preventDefault();
      ctxMenu.style.display = 'block';
      const x = Math.min(e.clientX, window.innerWidth  - ctxMenu.offsetWidth  - 4);
      const y = Math.min(e.clientY, window.innerHeight - ctxMenu.offsetHeight - 4);
      ctxMenu.style.left = x + 'px';
      ctxMenu.style.top  = y + 'px';
    });

    document.addEventListener('click', () => hideCtxMenu());
    document.addEventListener('keydown', e => { if (e.key === 'Escape') hideCtxMenu(); });
    function hideCtxMenu() { ctxMenu.style.display = 'none'; }

    document.getElementById('ctx-copy').addEventListener('click', () => {
      hideCtxMenu();
      if (activeId && sessions[activeId]) sessions[activeId].term.focus();
    });

    document.getElementById('ctx-paste').addEventListener('click', () => {
      hideCtxMenu();
      const target = activeId !== null ? activeId : splitPrimId;
      if (target !== null) {
        window.chrome.webview.postMessage(
          JSON.stringify({ type: 'paste-request', sessionId: target })
        );
      }
    });

    document.getElementById('ctx-selall').addEventListener('click', () => {
      hideCtxMenu();
      if (activeId && sessions[activeId]) sessions[activeId].term.selectAll();
    });

    document.getElementById('ctx-clear').addEventListener('click', () => {
      hideCtxMenu();
      if (activeId && sessions[activeId]) {
        sessions[activeId].term.clear();
        sessions[activeId].term.focus();
      }
    });

    // ── 自动调整大小 ──────────────────────────────────────────────────────────
    new ResizeObserver(() => {
      if (splitPrimId !== null && sessions[splitPrimId]) scheduleSessionLayout(splitPrimId, { notify: true, focus: false });
      if (splitSecId  !== null && sessions[splitSecId])  scheduleSessionLayout(splitSecId,  { notify: true, focus: false });
      if (splitPrimId === null && activeId !== null && sessions[activeId]) {
        scheduleSessionLayout(activeId, { notify: true, focus: false });
      }
    }).observe(root);
  </script>
</body>
</html>
